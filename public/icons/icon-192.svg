<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6750A4"/>
      <stop offset="100%" style="stop-color:#21005D"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Open Bible -->
  <g transform="translate(96,96)">
    <!-- Left page -->
    <path d="M-48,-40 C-48,-40 -4,-35 0,-30 L0,50 C-4,45 -48,48 -48,48 Z" fill="white" opacity="0.95"/>
    <!-- Right page -->
    <path d="M48,-40 C48,-40 4,-35 0,-30 L0,50 C4,45 48,48 48,48 Z" fill="white" opacity="0.85"/>
    <!-- Spine line -->
    <line x1="0" y1="-32" x2="0" y2="50" stroke="#6750A4" stroke-width="2.5"/>
    <!-- Lines on left page -->
    <line x1="-38" y1="-15" x2="-8" y2="-18" stroke="#EADDFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="-38" y1="-5" x2="-8" y2="-8" stroke="#EADDFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="-38" y1="5" x2="-8" y2="2" stroke="#EADDFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="-38" y1="15" x2="-8" y2="12" stroke="#EADDFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="-38" y1="25" x2="-8" y2="22" stroke="#EADDFF" stroke-width="2" stroke-linecap="round"/>
    <!-- Lines on right page -->
    <line x1="38" y1="-15" x2="8" y2="-18" stroke="#D0BCFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="-5" x2="8" y2="-8" stroke="#D0BCFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="5" x2="8" y2="2" stroke="#D0BCFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="15" x2="8" y2="12" stroke="#D0BCFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="25" x2="8" y2="22" stroke="#D0BCFF" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
